name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils-arm-none-eabi gcc-arm-none-eabi libpng-dev

      - name: Build tools
        run: |
          # Ensure tools are compiled before the ROM build
          make tools

      - name: Build ROM
        run: |
          # Use "make modern" as required by HnS/Modern Emerald projects
          make modern
          
      - name: Upload ROM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rom-build
          path: |
            *.gba
            build/
